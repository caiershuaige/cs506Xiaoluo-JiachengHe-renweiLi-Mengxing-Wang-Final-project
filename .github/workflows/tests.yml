name: tests

on:
  push:
  pull_request:

jobs:
  notebook-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: make install
      - name: Run lightweight tests
        run: make test
